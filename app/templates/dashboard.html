<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CRM Turismo</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2>CRM Turismo</h2>

            <nav>
                <a href="/dashboard" class="active">Dashboard</a>
                <a href="/users">Usuários</a>
                <a href="/leads">Leads</a>
                <a href="/logout">Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Dashboard</h1>
                <p>Bem-vindo ao painel principal do CRM.</p>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3>Usuário logado</h3>
                    <p>{{ user }}</p>
                </div>

                <div class="info-card">
                    <h3>Módulo atual</h3>
                    <p>Dashboard</p>
                </div>

                <div class="info-card">
                    <h3>Status</h3>
                    <p>Online</p>
                </div>
            </div>

            <div class="card">
                <h2>Resumo do sistema</h2>
                <p style="margin-top: 12px; color: #4b5563; line-height: 1.6;">
                    Esse é o painel principal do seu CRM. Aqui você poderá acessar os módulos internos do sistema.
                </p>
            </div>
        </main>
    </div>

</body>
</html>
