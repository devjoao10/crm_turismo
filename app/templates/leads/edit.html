<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Lead - CRM Turismo</title>
    <link rel="stylesheet" href="/static/css/style.css?v=11">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2>CRM Turismo</h2>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <a href="/users">Usuários</a>
                <a href="/leads" class="active">Leads</a>
                <a href="/logout">Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Editar Lead</h1>
                <p>Atualize as informações do lead.</p>
            </div>

            <div class="card form-container">
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}

                <form action="/leads/{{ lead.id }}/edit" method="post">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" name="name" value="{{ lead.name }}" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ lead.email }}" required>
                    </div>

                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="text" name="whatsapp" value="{{ lead.whatsapp }}" required>
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select name="status" required>
                            {% for value, label in status_options %}
                                <option value="{{ value }}" {% if lead.status == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Funil de Vendas</label>
                        <select name="pipeline_stage_id">
                            <option value="">Nenhum Funil / Avulso</option>
                            {% for pipeline in pipelines %}
                                <optgroup label="{{ pipeline.name }}">
                                    {% for stage in pipeline.stages|sort(attribute='order') %}
                                        <option value="{{ stage.id }}" {% if lead.pipeline_stage_id == stage.id %}selected{% endif %}>
                                            {{ stage.name }}
                                        </option>
                                    {% endfor %}
                                </optgroup>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Destinos</label>
                        <div class="checkbox-group">
                            {% for destination in destinations %}
                            <label class="checkbox-item">
                                <input
                                    type="checkbox"
                                    name="destination_ids"
                                    value="{{ destination.id }}"
                                    {% if destination.id in selected_destination_ids %}checked{% endif %}
                                >
                                {{ destination.name }}
                            </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Data de ida</label>
                        <input type="date" name="travel_start_date" value="{{ lead.travel_start_date }}" required>
                    </div>

                    <div class="form-group">
                        <label>Data de volta</label>
                        <input type="date" name="travel_end_date" value="{{ lead.travel_end_date }}" required>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn">Salvar Alterações</button>
                        <a href="/leads" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
